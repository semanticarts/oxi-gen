name: Tag on Version Change

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Cargo.toml'

jobs:
  tag-version:
    runs-on: ubuntu-latestq

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # needed to fetch full history to compare versions

    - name: Get previous version from last commit
      id: get_prev_version
      run: |
        git show HEAD~1:Cargo.toml > old_Cargo.toml
        prev_version=$(grep '^version =' old_Cargo.toml | head -1 | sed -E 's/version = "(.*)"/\1/')
        echo "prev_version=$prev_version" >> $GITHUB_OUTPUT

    - name: Get current version from Cargo.toml
      id: get_curr_version
      run: |
        curr_version=$(grep '^version =' Cargo.toml | head -1 | sed -E 's/version = "(.*)"/\1/')
        echo "curr_version=$curr_version" >> $GITHUB_OUTPUT

    - name: Create tag if version changed
      if: steps.get_prev_version.outputs.prev_version != steps.get_curr_version.outputs.curr_version
      env:
        VERSION: ${{ steps.get_curr_version.outputs.curr_version }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Version changed from ${{ steps.get_prev_version.outputs.prev_version }} to $VERSION"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag "v$VERSION"
        git push origin "v$VERSION"
